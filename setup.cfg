[tool:pytest]
testpaths = source
python_files = tests.py test_*.py *_test.py
python_classes = Test* *TestCase *Tests
python_functions = test_*
DJANGO_SETTINGS_MODULE = tests.test_settings

[coverage:run]
source = source
omit =
    */migrations/*
    */tests/*
    source/tests/*
    source/run_tests.py
    source/manage.py
    source/webserver/wsgi.py
    source/webserver/asgi.py

[coverage:report]
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass$
