global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['{{ node_exporter_target }}']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['{{ cadvisor_target }}']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['{{ prometheus_target }}']

# rendered for domain: {{ domain_name }}
