services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    env_file:
      - ./env/node-exporter/env
    networks:
      - monitoring_nw
    deploy:
      resources:
        limits:
          memory: 100M # Prevent the monitor from eating your RAM

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: false
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    env_file:
      - ./env/cadvisor/env
    networks:
      - monitoring_nw

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "65534:65534" # Run as non-root user (nobody)
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./env/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./blob_storage/prometheus_data:/prometheus
    env_file:
      - ./env/prometheus/env
    networks:
      - monitoring_nw

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000" # Only accessible from the host itself (use a Reverse Proxy for public access)
    env_file:
      - ./env/grafana/env
    networks:
      - monitoring_nw

networks:
  monitoring_nw:
    driver: bridge
    #internal: true # This network cannot access the outside internet
